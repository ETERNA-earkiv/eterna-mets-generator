mets-generator.ip_profile.sip.title = SIP
mets-generator.ip_profile.sip.description = Generate E-ARK CSIP METS file(s) with the SIP (Submission Information Package) profile. Useful for exporting packages that are intended to be immediately re-ingested in another archive.

mets-generator.ip_profile.aip.title = AIP
mets-generator.ip_profile.aip.description = Generate an E-ARK CSIP METS file(s) with the AIP (Archival Information Package) profile. Useful for exporting packages that are representing the Information Package as they're maintained in this archive.

mets-generator.ip_profile.dip.title = DIP
mets-generator.ip_profile.dip.description = Generate an E-ARK CSIP METS file(s) with the DIP (Dissemination Information Package) profile. Useful for exporting packages that are intended for dissemination.
